const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SHORT_M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let view = 'cal', curY, curM, searchQ = '';
const colCache = {}; let colIdx = 0;
function getCol(n){ if(!colCache[n]) colCache[n]=(colIdx++)%16; return colCache[n]; }
const events = RAW.events.map(e=>({
  name:e.n||'', room:e.r||'',
  setupDate:e.sd?new Date(e.sd):null, setupTime:e.st||'',
  startDate:e.ad?new Date(e.ad):null, startTime:e.at||'',
  removalDate:e.rd?new Date(e.rd):null, removalTime:e.rt||'',
  manager:e.sm||'', pms:e.pm||'', notes:e.nt||'', file:e.f||'',
  col:getCol(e.n||'?')
}));
function fmtShort(d){ return d?SHORT_M[d.getMonth()]+' '+d.getDate():''; }
function fmtD(d){ return d?d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'-\-'; }
function sameDay(a,b){ return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function evRange(ev){ return{start:ev.setupDate||ev.startDate, end:ev.removalDate||ev.startDate||ev.setupDate}; }
function eventsOnDay(y,m,d){
  const dt=new Date(y,m,d).getTime();
  return events.filter(ev=>{
    if(searchQ&&!ev.name.toLowerCase().includes(searchQ)&&!ev.room.toLowerCase().includes(searchQ)) return false;
    const {start,end}=evRange(ev); if(!start) return false;
    const s=new Date(start.getFullYear(),start.getMonth(),start.getDate()).getTime();
    const e2=end?new Date(end.getFullYear(),end.getMonth(),end.getDate()).getTime():s;
    return dt>=s&&dt<=e2;
  });
}
function onSearch(){ searchQ=document.getElementById('searchBox').value.trim().toLowerCase(); render(); }
function setView(v){
  view=v;
  document.getElementById('calViewBtn').className='btn'+(v==='cal'?' active':'');
  document.getElementById('lstViewBtn').className='btn'+(v==='list'?' active':'');
  document.getElementById('calSection').style.display=v==='cal'?'':'none';
  document.getElementById('lstSection').style.display=v==='list'?'':'none';
  render();
}
function chMonth(d){ curM+=d; if(curM<0){curM=11;curY--;} if(curM>11){curM=0;curY++;} render(); }
function goToday(){ const n=new Date(); curY=n.getFullYear(); curM=n.getMonth(); render(); }
function render(){
  document.getElementById('monthLbl').textContent=MONTHS[curM]+' '+curY;
  const me=events.filter(ev=>{
    if(searchQ&&!ev.name.toLowerCase().includes(searchQ)&&!ev.room.toLowerCase().includes(searchQ)) return false;
    const {start,end}=evRange(ev); if(!start) return false;
    const ms=new Date(curY,curM,1).getTime(), me2=new Date(curY,curM+1,0).getTime();
    const s=new Date(start.getFullYear(),start.getMonth(),start.getDate()).getTime();
    const e2=end?new Date(end.getFullYear(),end.getMonth(),end.getDate()).getTime():s;
    return s<=me2&&e2>=ms;
  });
  document.getElementById('toolbarInfo').textContent=me.length+' event'+(me.length!==1?'s':'')+' in '+MONTHS[curM]+' '+curY+(searchQ?' matching "'+searchQ+'"':'');
  document.getElementById('updatedAt').textContent='Extracted: '+RAW.g;
  if(view==='cal') renderCal(); else renderList();
}
function renderCal(){
  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  const today=new Date(), fd=new Date(curY,curM,1).getDay(), dim=new Date(curY,curM+1,0).getDate(), dip=new Date(curY,curM,0).getDate();
  const total=Math.ceil((fd+dim)/7)*7;
  for(let i=0;i<total;i++){
    const cell=document.createElement('div'); cell.className='day-cell';
    let day,isCur=true;
    if(i<fd){day=dip-fd+i+1;isCur=false;cell.classList.add('other');}
    else if(i>=fd+dim){day=i-fd-dim+1;isCur=false;cell.classList.add('other');}
    else day=i-fd+1;
    if(isCur&&today.getDate()===day&&today.getMonth()===curM&&today.getFullYear()===curY) cell.classList.add('today');
    const ne=document.createElement(cell.classList.contains('today')?'div':'span'); ne.className='day-num'; ne.textContent=day; cell.appendChild(ne);
    if(isCur){
      const de=eventsOnDay(curY,curM,day);
      de.slice(0,3).forEach(ev=>{
        const c=document.createElement('span'); c.className='chip c'+ev.col;
        c.textContent=ev.name+(ev.room?' - '+ev.room:'');
        c.title=ev.name+(ev.room?' - '+ev.room:'');
        c.onclick=()=>showModal(ev); cell.appendChild(c);
      });
      if(de.length>3){
        const m=document.createElement('span'); m.className='more-chip';
        m.textContent='+'+(de.length-3)+' more';
        m.onclick=()=>showDayModal(curY,curM,day,de); cell.appendChild(m);
      }
    }
    grid.appendChild(cell);
  }
}
function renderList(){
  const wrap=document.getElementById('listWrap'); wrap.innerHTML='';
  const filtered=events.filter(ev=>{
    if(searchQ&&!ev.name.toLowerCase().includes(searchQ)&&!ev.room.toLowerCase().includes(searchQ)) return false;
    return !!(evRange(ev).start);
  });
  if(!filtered.length){wrap.innerHTML='<div class="empty">No events found.</div>';return;}
  const groups={};
  filtered.forEach(ev=>{
    const d=evRange(ev).start;
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    if(!groups[k]) groups[k]=[];
    groups[k].push(ev);
  });
  Object.keys(groups).sort().forEach(k=>{
    const [yr,mo]=k.split('-');
    const hdr=document.createElement('div'); hdr.className='list-month';
    hdr.textContent=MONTHS[parseInt(mo)-1]+' '+yr; wrap.appendChild(hdr);
    groups[k].forEach(ev=>{
      const {start,end}=evRange(ev);
      let ds=fmtShort(ev.startDate||ev.setupDate);
      if(end&&!sameDay(start,end)) ds+=' - '+fmtShort(end);
      const row=document.createElement('div'); row.className='list-row';
      row.innerHTML='<div style="border-radius:4px;background:currentColor;filter:opacity(.35)" class="c'+ev.col+'"></div><div><div class="list-name">'+esc(ev.name)+'</div>'+(ev.room?'<div class="list-room">'+esc(ev.room)+'</div>':'')+'<div class="list-dates">'+ds+(ev.startTime?' &middot; '+esc(ev.startTime):'')+'</div></div><div class="list-badge c'+ev.col+'">'+( ev.pms?'#'+esc(ev.pms):'Event')+'</div>';
      row.onclick=()=>showModal(ev); wrap.appendChild(row);
    });
  });
}
function showModal(ev){
  document.getElementById('mTitle').innerHTML='<span class="room-tag c'+ev.col+'">'+esc(ev.name)+'</span>';
  let h='';
  if(ev.room) h+='<div class="mrow"><div class="mlbl">Room</div><div class="mval">'+esc(ev.room)+'</div></div>';
  h+='<div class="mrow"><div class="mlbl">Schedule</div><div class="time-grid"><div class="time-box"><div class="tb-lbl">Setup</div><div class="tb-date">'+(fmtShort(ev.setupDate)||'--')+'</div><div class="tb-time">'+esc(ev.setupTime||'--')+'</div></div><div class="time-box"><div class="tb-lbl">Start</div><div class="tb-date">'+(fmtShort(ev.startDate)||'--')+'</div><div class="tb-time">'+esc(ev.startTime||'--')+'</div></div><div class="time-box"><div class="tb-lbl">Removal</div><div class="tb-date">'+(fmtShort(ev.removalDate)||'--')+'</div><div class="tb-time">'+esc(ev.removalTime||'--')+'</div></div></div></div>';
  if(ev.manager) h+='<div class="mrow"><div class="mlbl">Sales Manager</div><div class="mval">'+esc(ev.manager)+'</div></div>';
  if(ev.pms) h+='<div class="mrow"><div class="mlbl">PMS / Folio</div><div class="mval">'+esc(ev.pms)+'</div></div>';
  if(ev.notes) h+='<div class="mrow"><div class="mlbl">Notes</div><div class="notes-box">'+esc(ev.notes)+'</div></div>';
  if(ev.file) h+='<div class="mrow"><div class="mlbl">File</div><div class="file-link">'+esc(ev.file)+'</div></div>';
  document.getElementById('mBody').innerHTML=h;
  document.getElementById('modal').style.display='flex';
}
function showDayModal(y,m,d,de){
  const dt=new Date(y,m,d);
  document.getElementById('mTitle').textContent=dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  let h='<div style="font-size:.8rem;color:#666;margin-bottom:10px">'+de.length+' events</div>';
  de.forEach((ev,i)=>{
    h+='<div style="border:1px solid #eee;border-radius:6px;padding:8px 10px;margin-bottom:6px;cursor:pointer" class="c'+ev.col+'" data-i="'+i+'"><div style="font-weight:600;font-size:.84rem">'+esc(ev.name)+'</div>'+(ev.room?'<div style="font-size:.74rem;margin-top:2px">'+esc(ev.room)+'</div>':'')+ '</div>';
  });
  document.getElementById('mBody').innerHTML=h;
  document.getElementById('modal').style.display='flex';
  document.querySelectorAll('#mBody [data-i]').forEach(el=>{
    el.onclick=()=>{closeModal();setTimeout(()=>showModal(de[+el.dataset.i]),50);};
  });
}
function closeModal(){ document.getElementById('modal').style.display='none'; }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
(function(){ const n=new Date(); curY=n.getFullYear(); curM=n.getMonth(); render(); })();
</script>
